name: Update Stock Prices

on:
  schedule:
    - cron: '0,30 1-5 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and save prices
        run: python3 fetch_prices.py

      - name: Commit if changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "chore: update stock prices" && git push)
