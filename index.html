<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ETF 曝險儀表板</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --green: #22c55e;
      --red: #ef4444;
      --orange: #f97316;
      --blue: #3b82f6;
      --border: #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px 16px 40px;
      max-width: 480px;
      margin: 0 auto;
    }
    h1 { font-size: 20px; font-weight: 700; }
    .subtitle { color: var(--muted); font-size: 13px; margin-top: 2px; margin-bottom: 20px; }

    .card {
      background: var(--surface);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
    }
    .price-row + .price-row { border-top: 1px solid var(--border); }
    .stock-name { font-weight: 700; font-size: 15px; }
    .stock-desc { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .price-value {
      font-size: 20px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }
    .price-change {
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      text-align: right;
      margin-top: 1px;
    }
    .up { color: var(--red); }
    .down { color: var(--green); }
    .flat { color: var(--muted); }

    .refresh-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
    }
    .last-update { font-size: 11px; color: var(--muted); }
    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .refresh-btn:hover { color: var(--text); border-color: var(--muted); }

    .market-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
    }
    .badge-open { background: rgba(34,197,94,.15); color: var(--green); }
    .badge-closed { background: rgba(148,163,184,.1); color: var(--muted); }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    .exposure-card {
      background: var(--surface);
      border-radius: 14px;
      padding: 28px 16px 20px;
      margin-bottom: 12px;
      text-align: center;
    }
    .exposure-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
    .exposure-value {
      font-size: 64px;
      font-weight: 800;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: color .3s;
    }
    .exposure-target { font-size: 12px; color: var(--muted); margin-top: 8px; }
    .exposure-deviation { font-size: 14px; font-weight: 600; margin-top: 6px; }
    .safe { color: var(--green); }
    .warn { color: var(--red); }

    .alloc-bar {
      display: flex;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      margin: 10px 0 8px;
    }
    .bar-0050 { background: var(--blue); transition: width .4s ease; }
    .bar-00631L { background: var(--orange); transition: width .4s ease; }
    .alloc-legend {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }
    .stat { background: var(--surface2); border-radius: 10px; padding: 12px; }
    .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .stat-value { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .stat-full { grid-column: span 2; }

    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 0;
    }
    .input-row + .input-row { border-top: 1px solid var(--border); }
    .input-label { flex: 1; }
    .input-label strong { font-size: 14px; }
    .input-label small { display: block; font-size: 11px; color: var(--muted); margin-top: 1px; }
    .input-field {
      width: 110px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 16px;
      padding: 8px 10px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      appearance: none;
      -moz-appearance: textfield;
    }
    .input-field:focus { outline: none; border-color: var(--blue); }
    .input-unit { font-size: 13px; color: var(--muted); width: 14px; }
    .hint { font-size: 11px; color: var(--muted); margin-top: 10px; }

    .btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      transition: opacity .15s;
    }
    .btn:active { opacity: .8; }
    .btn-primary { background: var(--blue); color: #fff; }

    .error-bar {
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: #fca5a5;
      margin-bottom: 12px;
      display: none;
    }
  </style>
</head>
<body>

<h1>ETF 曝險儀表板</h1>
<p class="subtitle">0050 + 00631L 組合觀測</p>

<div id="errorBar" class="error-bar">
  ⚠️ 股價抓取失敗，請確認網路連線或稍後再試
</div>

<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
    <span class="card-title" style="margin-bottom:0">即時股價</span>
    <span id="marketBadge" class="market-badge badge-closed">
      <span class="badge-dot"></span>收盤中
    </span>
  </div>

  <div class="price-row">
    <div>
      <div class="stock-name">0050</div>
      <div class="stock-desc">元大台灣 50</div>
    </div>
    <div>
      <div class="price-value" id="price0050">--</div>
      <div class="price-change flat" id="change0050">--</div>
    </div>
  </div>

  <div class="price-row">
    <div>
      <div class="stock-name">00631L</div>
      <div class="stock-desc">元大台灣 50 正 2（2×）</div>
    </div>
    <div>
      <div class="price-value" id="price00631L">--</div>
      <div class="price-change flat" id="change00631L">--</div>
    </div>
  </div>

  <div class="refresh-row">
    <span class="last-update" id="lastUpdate">尚未更新</span>
    <button class="refresh-btn" onclick="fetchAndUpdate()">↻ 重新整理</button>
  </div>
</div>

<div class="exposure-card">
  <div class="exposure-label">綜合曝險率</div>
  <div class="exposure-value flat" id="exposureValue">--%</div>
  <div class="exposure-target">目標 150%（0050×1 + 00631L×2）</div>
  <div class="exposure-deviation" id="exposureDev"></div>
</div>

<div class="card">
  <div class="card-title">資產配置</div>

  <div class="alloc-bar">
    <div class="bar-0050" id="bar0050" style="width:50%"></div>
    <div class="bar-00631L" id="bar00631L" style="width:50%"></div>
  </div>
  <div class="alloc-legend">
    <span><span class="dot" style="background:var(--blue)"></span>0050 <strong id="pct0050">--%</strong></span>
    <span><span class="dot" style="background:var(--orange)"></span>00631L <strong id="pct00631L">--%</strong></span>
  </div>

  <div class="stats-grid">
    <div class="stat">
      <div class="stat-label">0050 市值</div>
      <div class="stat-value" id="val0050">--</div>
    </div>
    <div class="stat">
      <div class="stat-label">00631L 市值</div>
      <div class="stat-value" id="val00631L">--</div>
    </div>
    <div class="stat stat-full">
      <div class="stat-label">總資產</div>
      <div class="stat-value" id="valTotal">--</div>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-title">持股設定</div>

  <div class="input-row">
    <div class="input-label">
      <strong>0050</strong>
      <small>元大台灣 50</small>
    </div>
    <input type="number" class="input-field" id="shares0050" placeholder="0" min="0">
    <span class="input-unit">股</span>
  </div>

  <div class="input-row">
    <div class="input-label">
      <strong>00631L</strong>
      <small>元大台灣 50 正 2</small>
    </div>
    <input type="number" class="input-field" id="shares00631L" placeholder="0" min="0">
    <span class="input-unit">股</span>
  </div>

  <p class="hint">1 張 = 1,000 股｜數字存在瀏覽器，下次開啟自動載入</p>
  <button class="btn btn-primary" onclick="saveAndCalc()">儲存並計算</button>
</div>

<script>
  const DEVIATION_LIMIT = 10;
  const TARGET_EXPOSURE = 150;

  let prices = {};

  function isMarketOpen() {
    const tw = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
    const d = tw.getDay();
    const m = tw.getHours() * 60 + tw.getMinutes();
    return d >= 1 && d <= 5 && m >= 540 && m < 810;
  }

  function updateMarketBadge() {
    const el = document.getElementById('marketBadge');
    if (isMarketOpen()) {
      el.className = 'market-badge badge-open';
      el.innerHTML = '<span class="badge-dot"></span>交易中';
    } else {
      el.className = 'market-badge badge-closed';
      el.innerHTML = '<span class="badge-dot"></span>收盤中';
    }
  }

  async function fetchOneStock(code) {
    const url = `https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY?stockNo=${code}`;
    const res = await fetch(url, { cache: 'no-cache' });
    if (!res.ok) throw new Error(`HTTP ${res.status} (${code})`);
    const data = await res.json();
    if (!Array.isArray(data) || !data.length) throw new Error(`無資料 (${code})`);
    const latest = data[data.length - 1];
    const priceStr = (latest['收盤價'] || latest.ClosingPrice || '').replace(/,/g, '');
    const signStr  = (latest['漲跌(+/-)'] || latest['漲跌(+/-）'] || '+').trim();
    const magStr   = (latest['漲跌價差']  || latest.Change || '0').replace(/,/g, '');
    const price = parseFloat(priceStr);
    if (isNaN(price)) throw new Error(`股價格式錯誤 (${code}): ${priceStr}`);
    const mag    = parseFloat(magStr) || 0;
    const change = signStr === '-' ? -mag : mag;
    return { price, prev: price - change };
  }

  async function fetchPrices() {
    try {
      const [r0050, r00631L] = await Promise.all([
        fetchOneStock('0050'),
        fetchOneStock('00631L'),
      ]);
      return { '0050': r0050, '00631L': r00631L };
    } catch(e) {
      console.warn('STOCK_DAY failed, trying STOCK_DAY_ALL:', e.message);
    }
    // 備用：一次抓所有股票再篩選
    const res = await fetch('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL', { cache: 'no-cache' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const result = {};
    for (const item of data) {
      const code = (item['證券代號'] || item.Code || '').trim();
      if (code !== '0050' && code !== '00631L') continue;
      const priceStr = (item['收盤價'] || item.ClosingPrice || '').replace(/,/g, '');
      const signStr  = (item['漲跌(+/-)'] || item['漲跌(+/-）'] || '+').trim();
      const magStr   = (item['漲跌價差']  || item.Change || '0').replace(/,/g, '');
      const price = parseFloat(priceStr);
      if (isNaN(price)) continue;
      const mag = parseFloat(magStr) || 0;
      result[code] = { price, prev: price - (signStr === '-' ? -mag : mag) };
    }
    if (!result['0050'] || !result['00631L']) throw new Error('找不到股票資料');
    return result;
  }

  function fmt(n) {
    if (n == null) return '--';
    return 'NT$' + Math.round(n).toLocaleString('zh-TW');
  }

  async function fetchAndUpdate() {
    try {
      prices = await fetchPrices();
      document.getElementById('errorBar').style.display = 'none';

      ['0050', '00631L'].forEach(code => {
        const s = prices[code];
        if (!s) return;
        const ch = s.price - s.prev;
        const pct = (ch / s.prev) * 100;
        const sign = ch >= 0 ? '+' : '';
        const cls = ch > 0 ? 'up' : ch < 0 ? 'down' : 'flat';

        document.getElementById('price' + code).textContent = s.price.toFixed(2);
        const chEl = document.getElementById('change' + code);
        chEl.textContent = `${sign}${ch.toFixed(2)}（${sign}${pct.toFixed(2)}%）`;
        chEl.className = 'price-change ' + cls;
      });

      const twNow = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
      document.getElementById('lastUpdate').textContent =
        '更新於 ' + twNow.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      calculate();
    } catch (e) {
      document.getElementById('errorBar').style.display = 'block';
      console.error(e);
    }
  }

  function calculate() {
    const sh0050 = parseFloat(document.getElementById('shares0050').value) || 0;
    const sh00631L = parseFloat(document.getElementById('shares00631L').value) || 0;
    const p0050 = prices['0050']?.price;
    const p00631L = prices['00631L']?.price;

    if (!p0050 || !p00631L) return;
    if (sh0050 === 0 && sh00631L === 0) return;

    const v0050 = sh0050 * p0050;
    const v00631L = sh00631L * p00631L;
    const total = v0050 + v00631L;
    if (total === 0) return;

    const exposure = (v0050 * 1 + v00631L * 2) / total * 100;
    const pct0050 = v0050 / total * 100;
    const pct00631L = v00631L / total * 100;
    const dev = exposure - TARGET_EXPOSURE;
    const isWarn = Math.abs(dev) > DEVIATION_LIMIT;

    const expEl = document.getElementById('exposureValue');
    expEl.textContent = exposure.toFixed(1) + '%';
    expEl.className = 'exposure-value ' + (isWarn ? 'warn' : 'safe');

    const devEl = document.getElementById('exposureDev');
    const sign = dev >= 0 ? '+' : '';
    if (isWarn) {
      devEl.textContent = `偏離目標 ${sign}${dev.toFixed(1)} 個百分點　⚠ 建議再平衡`;
      devEl.className = 'exposure-deviation warn';
    } else {
      devEl.textContent = `偏離目標 ${sign}${dev.toFixed(1)} 個百分點　✓ 在安全範圍內`;
      devEl.className = 'exposure-deviation safe';
    }

    document.getElementById('bar0050').style.width = pct0050.toFixed(2) + '%';
    document.getElementById('bar00631L').style.width = pct00631L.toFixed(2) + '%';
    document.getElementById('pct0050').textContent = pct0050.toFixed(1) + '%';
    document.getElementById('pct00631L').textContent = pct00631L.toFixed(1) + '%';

    document.getElementById('val0050').textContent = fmt(v0050);
    document.getElementById('val00631L').textContent = fmt(v00631L);
    document.getElementById('valTotal').textContent = fmt(total);
  }

  function saveAndCalc() {
    localStorage.setItem('sh_0050', document.getElementById('shares0050').value);
    localStorage.setItem('sh_00631L', document.getElementById('shares00631L').value);
    calculate();
  }

  function loadSaved() {
    const s0 = localStorage.getItem('sh_0050');
    const s6 = localStorage.getItem('sh_00631L');
    if (s0) document.getElementById('shares0050').value = s0;
    if (s6) document.getElementById('shares00631L').value = s6;
  }

  function scheduleAutoRefresh() {
    if (isMarketOpen()) {
      setTimeout(() => fetchAndUpdate().then(scheduleAutoRefresh), 60000);
    }
  }

  updateMarketBadge();
  setInterval(updateMarketBadge, 60000);
  loadSaved();
  fetchAndUpdate().then(scheduleAutoRefresh);
</script>

</body>
</html>
